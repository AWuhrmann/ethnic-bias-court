# Name groups sourced entirely from the names_dataset API (get_top_names).
# No names were invented or manually added.
#
# Alpha-2 sources per group:
#   swiss_german     — first: CH, last: DE  (CH last names skewed by Portuguese diaspora)
#   swiss_french     — first+last: FR       (non-French surnames filtered: Garcia, Da Silva, Diallo …)
#   swiss_italian    — first+last: IT       (Singh filtered)
#   turkish          — TR
#   albanian         — AL
#   serbian          — RS                   (API returns names without diacritics)
#   arab_maghrebi    — first: MA, last: TN  (MA last names are mostly first-name/particle artifacts)
#   subsaharan_african — BF (Burkina Faso)  (SN/ML/GN not in database; closest Sahel country)
#   south_asian      — IN                   (Md abbreviation and Puja/Vicky artifacts filtered)

